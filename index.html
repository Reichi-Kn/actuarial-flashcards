<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクチュアリー数学 暗記カード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']],
    processEscapes: true,
    tags: 'none'
  },
  svg: {
    fontCache: 'global',
    scale: 1.0,
    minScale: 0.4,
    mtextInheritFont: false
  },
  options: {
    skipHtmlTags: ['script','noscript','style','textarea'],
    renderActions: { addMenu: [] }
  },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --ink: #1a1410;
    --parchment: #f5f0e8;
    --cream: #faf7f2;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --rust: #8b3a2a;
    --sage: #4a6741;
    --deep-blue: #1e3a5f;
    --line: #d4c9b0;
    --shadow: rgba(26,20,16,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(184,134,11,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(30,58,95,0.06) 0%, transparent 60%);
  }

  /* Header */
  header {
    background: var(--deep-blue);
    color: var(--parchment);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--gold-light);
  }
  .header-subtitle {
    font-size: 0.7rem;
    color: #a0b4c8;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .progress-info {
    text-align: right;
    font-size: 0.8rem;
    color: #a0b4c8;
  }
  .progress-bar-wrap {
    width: 160px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Main layout */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    overflow-x: clip; /* カードが横にはみ出せるが背景は動かない */
  }

  /* Category tabs */
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .tab {
    padding: 7px 16px;
    border: 1.5px solid var(--line);
    background: white;
    border-radius: 2px;
    font-size: 0.78rem;
    font-family: 'Noto Serif JP', serif;
    cursor: pointer;
    transition: all 0.2s;
    color: #6b5c4a;
    letter-spacing: 0.03em;
  }
  .tab:hover { border-color: var(--gold); color: var(--gold); }
  .tab.active {
    background: var(--deep-blue);
    border-color: var(--deep-blue);
    color: var(--parchment);
    font-weight: 600;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 28px;
    /* カードのみ動かすため overflow visible */
    overflow: visible;
    position: relative;
  }

  .card-wrapper {
    position: relative;
    width: 100%;
    min-height: 340px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s;
    cursor: pointer;
    will-change: transform;
  }
  .card-wrapper.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    padding: 22px 28px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }
  /* 表面・裏面ともに内容に合わせて高さを確保するためダミーを用意 */
  .card-sizer {
    visibility: hidden;
    padding: 22px 28px;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    min-height: 340px;
  }

  .card-front {
    background: white;
    border: 1.5px solid var(--line);
    box-shadow: 0 4px 24px var(--shadow), 0 1px 4px var(--shadow);
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--deep-blue), var(--gold));
    border-radius: 4px 4px 0 0;
  }

  .card-back {
    background: var(--parchment);
    border: 1.5px solid var(--gold);
    box-shadow: 0 4px 24px var(--shadow);
    transform: rotateY(180deg);
  }
  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--rust));
    border-radius: 4px 4px 0 0;
  }

  .card-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9a8778;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .card-category-badge {
    display: inline-block;
    padding: 2px 10px;
    border: 1px solid currentColor;
    border-radius: 2px;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .card-front .card-category-badge { color: var(--deep-blue); }
  .card-back .card-category-badge { color: var(--rust); }

  .card-question {
    font-size: clamp(0.82rem, 2.4vw, 1.2rem);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    line-height: 1.9;
    color: var(--ink);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    word-break: keep-all;
    overflow-wrap: anywhere;
  }
  .card-question
  .card-hint {
    font-size: 0.75rem;
    color: #b0a090;
    text-align: center;
    margin-top: 20px;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .card-hint svg { opacity: 0.5; }

  .card-answer-title {
    font-size: 0.85rem;
    color: var(--rust);
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
  }

  .card-answer {
    font-size: clamp(0.78rem, 2.2vw, 0.98rem);
    line-height: 2.0;
    color: #2a1f18;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .card-answer  .card-answer  /* Inline math in answer */
  .card-answer p  /* Question math */
  .card-question
  .card-answer .formula-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    background: rgba(30,58,95,0.06);
    padding: 8px 14px;
    margin: 8px 0;
    border-left: 3px solid var(--deep-blue);
    border-radius: 0 2px 2px 0;
    color: var(--deep-blue);
    overflow-x: auto;
  }

  .card-answer .param {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    color: var(--sage);
    background: rgba(74,103,65,0.08);
    padding: 1px 6px;
    border-radius: 2px;
    margin: 1px;
  }

  .card-answer ul { padding-left: 18px; }
  .card-answer li { margin: 5px 0; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .btn {
    padding: 11px 28px;
    border: none;
    border-radius: 2px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-prev {
    background: white;
    color: var(--ink);
    border: 1.5px solid var(--line);
  }
  .btn-prev:hover { border-color: var(--deep-blue); color: var(--deep-blue); }

  .btn-next {
    background: var(--deep-blue);
    color: var(--parchment);
    box-shadow: 0 2px 8px rgba(30,58,95,0.3);
  }
  .btn-next:hover { background: #162d4a; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(30,58,95,0.35); }

  .btn-flip {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: white;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(184,134,11,0.35);
  }
  .btn-flip:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(184,134,11,0.4); }

  .counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: #9a8778;
    min-width: 60px;
    text-align: center;
  }

  /* Result buttons */
  .result-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 8px;
  }
  .btn-correct {
    background: var(--sage);
    color: white;
    padding: 9px 24px;
    font-size: 0.82rem;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-correct:hover { background: #3a5632; transform: translateY(-1px); }
  .btn-incorrect {
    background: var(--rust);
    color: white;
    padding: 9px 24px;
    font-size: 0.82rem;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-incorrect:hover { background: #6b2d1e; transform: translateY(-1px); }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .stat-pill {
    padding: 6px 16px;
    border-radius: 2px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-correct { background: rgba(74,103,65,0.12); color: var(--sage); border: 1px solid rgba(74,103,65,0.25); }
  .stat-incorrect { background: rgba(139,58,42,0.1); color: var(--rust); border: 1px solid rgba(139,58,42,0.2); }
  .stat-remaining { background: rgba(30,58,95,0.08); color: var(--deep-blue); border: 1px solid rgba(30,58,95,0.18); }

  /* Mode selector */
  .mode-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .mode-btn {
    padding: 5px 14px;
    font-size: 0.73rem;
    border: 1.5px solid var(--line);
    background: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.2s;
    color: #7a6a58;
  }
  .mode-btn.active { background: var(--rust); border-color: var(--rust); color: white; }

  .shuffle-btn {
    padding: 5px 14px;
    font-size: 0.73rem;
    border: 1.5px solid var(--line);
    background: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.2s;
    color: #7a6a58;
  }
  .shuffle-btn:hover { border-color: var(--gold); color: var(--gold); }

  .result-panel {
    display: none;
    text-align: center;
    padding: 40px;
    background: white;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .result-panel.show { display: block; }
  .result-panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--deep-blue);
    margin-bottom: 12px;
  }
  .result-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 3rem;
    color: var(--gold);
    font-weight: 600;
    line-height: 1;
    margin: 16px 0;
  }


  .card-answer


  /* ===================== MOBILE RESPONSIVE ===================== */
  @media (max-width: 600px) {
    header {
      padding: 12px 16px;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .header-title { font-size: 1.15rem; }
    .header-subtitle { font-size: 0.62rem; }
    .progress-info { text-align: left; }
    .progress-bar-wrap { width: 100%; }

    main { padding: 14px 12px 60px; }

    .tabs {
      gap: 6px;
      margin-bottom: 16px;
      /* horizontal scroll for tabs */
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .tab {
      white-space: nowrap;
      padding: 6px 13px;
      font-size: 0.73rem;
      flex-shrink: 0;
    }

    /* Mode row stacks nicely */
    div[style*="justify-content:space-between"] {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 10px !important;
    }
    .mode-row { flex-wrap: wrap; gap: 6px; }
    .mode-btn, .shuffle-btn { font-size: 0.7rem; padding: 5px 12px; }

    /* Stats row */
    .stats-row { gap: 8px; flex-wrap: wrap; justify-content: flex-start; }
    .stat-pill { font-size: 0.7rem; padding: 5px 10px; }

    /* Card */
    .card-wrapper { min-height: 360px; }
    .card-face {
      padding: 14px 12px;
    }
    .card-question {
      font-size: clamp(0.75rem, 3.8vw, 1.0rem);
      line-height: 1.55;
    }
    .card-answer {
      font-size: clamp(0.72rem, 3.2vw, 0.88rem);
      line-height: 1.85;
    }
    .card-question {
      font-size: 1.1rem;
      line-height: 1.6;
    }
    .card-answer {
      font-size: 0.9rem;
      line-height: 2.0;
    }
    .card-label { font-size: 0.6rem; }
    .card-category-badge { font-size: 0.6rem; padding: 2px 8px; }
    .card-hint { font-size: 0.68rem; }
    .card-answer-title { font-size: 0.78rem; }

    /* MathJax display math on mobile */



    /* Controls */
    .controls { gap: 10px; }
    .btn { padding: 10px 18px; font-size: 0.82rem; }
    .counter { font-size: 0.78rem; min-width: 48px; }

    /* Result buttons */
    .result-btns { gap: 10px; }
    .btn-correct, .btn-incorrect {
      padding: 10px 20px;
      font-size: 0.78rem;
      flex: 1;
      justify-content: center;
    }

    /* Completion panel */
    .result-panel { padding: 28px 20px; }
    .result-panel h2 { font-size: 1.5rem; }
    .result-score { font-size: 2.2rem; }
  }

  @media (max-width: 380px) {
    .card-face { padding: 18px 14px; }
    .card-question { font-size: 1rem; }
    .card-answer { font-size: 0.82rem; }
    .btn { padding: 9px 14px; font-size: 0.78rem; }
  }

  /* Touch-friendly tap area */
  @media (hover: none) {
    .card-wrapper { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn, .tab, .mode-btn, .shuffle-btn, .btn-correct, .btn-incorrect {
      min-height: 40px;
    }
  }


  @media (max-width: 600px) {
    #statsModal > div {
      padding: 20px 16px;
      margin: 0;
      border-radius: 0;
      min-height: 100vh;
    }
    #statsModal > div h2 { font-size: 1.3rem; }
  }


  /* ── MathJax 統一スタイル ──────────────────── */
  /* インライン数式: inline のまま */
  /* ディスプレイ数式($$...$$): ブロック表示 */
  /* 答え面のディスプレイ数式: 左ボーダー付き */
  .card-answer  /* 問題文のディスプレイ数式: 中央揃え */
  .card-question
  /* ── MathJax 統一スタイル ── */
  /* インライン $...$ → inline */
  /* ディスプレイ $$...$$ → block */
  .card-answer  .card-question
  /* ── MathJax 統一スタイル ── */
  /* デフォルト: インライン（$...$） → 改行しない */
  mjx-container {
    display: inline !important;
    margin: 0 0.15em !important;
    vertical-align: middle;
    line-height: 1;
  }
  /* ディスプレイ数式（$$...$$）のみブロック */
  mjx-container[display="true"] {
    display: block !important;
    margin: 10px 0 !important;
    overflow-x: auto;
    max-width: 100%;
    line-height: normal;
  }
  /* 答え面のディスプレイ数式 */
  .card-answer mjx-container[display="true"] {
    background: rgba(30,58,95,0.04);
    border-left: 3px solid var(--deep-blue);
    padding: 8px 12px;
    border-radius: 0 3px 3px 0;
  }
  /* 問題面のディスプレイ数式 */
  .card-question mjx-container[display="true"] {
    text-align: center !important;
    margin: 8px auto !important;
  }
  mjx-container svg {
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">📐 アクチュアリー数学 暗記カード</div>
    <div class="header-subtitle">ACTUARIAL MATHEMATICS — FLASHCARD SYSTEM</div>
  </div>
  <div class="progress-info">
    <span id="progressText">0 / 0 完了</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</header>

<main>
  <!-- Category tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode & shuffle -->
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
    <div class="mode-row" style="margin:0;">
      <button class="mode-btn active" onclick="setMode('all')" id="modeAll">全カード</button>
      <button class="mode-btn" onclick="setMode('review')" id="modeReview">📅 復習</button>
      <button class="mode-btn" onclick="setMode('incorrect')" id="modeIncorrect">不正解のみ</button>
      <button class="mode-btn" onclick="setMode('unseen')" id="modeUnseen">未学習のみ</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="shuffle-btn" onclick="shuffleCards()">🔀 シャッフル</button>
      <button class="shuffle-btn" onclick="showStats()">📊 統計</button>
      <button class="shuffle-btn" onclick="showCardList()">📋 一覧</button>
      <button class="shuffle-btn" onclick="generatePDF()" id="pdfBtn">📄 PDF</button>
      <button class="shuffle-btn" onclick="resetStats()">↺ リセット</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill stat-correct">✓ 正解: <strong id="statCorrect">0</strong></div>
    <div class="stat-pill stat-incorrect">✗ 不正解: <strong id="statIncorrect">0</strong></div>
    <div class="stat-pill stat-remaining">◯ 残り: <strong id="statRemaining">0</strong></div>
  </div>

  <!-- Card -->
  <!-- スワイプ操作ガイド（答え表示後のみ） -->
  <div id="swipeGuide" style="display:none;text-align:center;margin-bottom:10px;font-size:0.72rem;color:#9a8778;letter-spacing:0.06em;">
    <span style="color:#8b3a2a;">← 左スワイプ = 不正解</span>
    &nbsp;&nbsp;｜&nbsp;&nbsp;
    <span style="color:#4a6741;">右スワイプ = 正解 →</span>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
      <!-- スワイプフィードバックオーバーレイ -->
      <div id="swipeOverlay" style="
        position:absolute;inset:0;z-index:10;border-radius:4px;
        display:flex;align-items:center;justify-content:center;
        font-size:4rem;color:white;font-weight:700;
        opacity:0;transition:opacity 0.1s;pointer-events:none;
        text-shadow:0 2px 12px rgba(0,0,0,0.3);
      "></div>
      <div class="card-face card-front" id="cardFront">
        <div class="card-label"><span id="cardLabelFront">QUESTION</span></div>
        <div class="card-category-badge" id="cardCategoryFront">—</div>
        <div class="card-question" id="cardQuestion">カードを読み込んでいます...</div>
        <div class="card-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 15l6 6m-11-4a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg>
          クリックして答えを見る

// =====================================================
// STATE
// =====================================================
let allCards = [...cards];
let filteredCards = [...cards];
let currentDeck = [...cards];
let currentIndex = 0;
let isFlipped = false;
let stats = JSON.parse(localStorage.getItem('actuarial_stats') || '{}');
// reviewData: { cardId: { nextReview: ISO date string, interval: days, streak: int } }
let reviewData = JSON.parse(localStorage.getItem('actuarial_review') || '{}');
// sessionLog: array of { date, correct, incorrect } per day
let sessionLog = JSON.parse(localStorage.getItem('actuarial_log') || '[]');
let currentCategory = 'all';
let currentMode = 'all';

function getCategories() {
  const cats = ['all', ...new Set(cards.map(c => c.category))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const categories = getCategories();
  tabsEl.innerHTML = categories.map(cat => `
    <button class="tab ${cat==='all'?'active':''}" onclick="selectCategory('${cat}')" id="tab-${cat.replace(/\s/g,'_')}">
      ${cat === 'all' ? 'すべて' : cat}
    </button>
  `).join('');
}

function selectCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+cat.replace(/\s/g,'_')).classList.add('active');
  rebuildDeck();
}

function setMode(mode) {
  currentMode = mode;
  ['all','review','incorrect','unseen'].forEach(m => document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1)).classList.remove('active'));
  document.getElementById('mode'+mode.charAt(0).toUpperCase()+mode.slice(1)).classList.add('active');
  rebuildDeck();
}

function getCardId(card) {
  return card.category + '|' + card.q.slice(0,20);
}

function saveStats() {
  try {
    localStorage.setItem('actuarial_stats', JSON.stringify(stats));
    localStorage.setItem('actuarial_review', JSON.stringify(reviewData));
    localStorage.setItem('actuarial_log', JSON.stringify(sessionLog));
  } catch(e) { console.warn('localStorage unavailable'); }
}

// ── SM-2風 間隔反復アルゴリズム ──
function updateReview(cardId, correct) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const r = reviewData[cardId] || { interval: 1, streak: 0 };
  if (correct) {
    r.streak = (r.streak || 0) + 1;
    if (r.streak === 1)      r.interval = 1;
    else if (r.streak === 2) r.interval = 3;
    else                     r.interval = Math.round(r.interval * 2.5);
  } else {
    r.streak = 0;
    r.interval = 1;
  }
  const next = new Date(today);
  next.setDate(next.getDate() + r.interval);
  r.nextReview = next.toISOString().slice(0,10);
  reviewData[cardId] = r;
}

function getDueCards() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);
  return cards.filter(c => {
    const r = reviewData[getCardId(c)];
    if (!r) return true; // 未学習は全部対象
    return r.nextReview <= todayStr;
  });
}

function logSession(correct) {
  const todayStr = new Date().toISOString().slice(0,10);
  let entry = sessionLog.find(e => e.date === todayStr);
  if (!entry) { entry = { date: todayStr, correct: 0, incorrect: 0 }; sessionLog.push(entry); }
  if (correct) entry.correct++; else entry.incorrect++;
  // keep last 60 days
  if (sessionLog.length > 60) sessionLog = sessionLog.slice(-60);
}

function rebuildDeck() {
  let base = currentCategory === 'all' ? [...cards] : cards.filter(c => c.category === currentCategory);
  if (currentMode === 'review') {
    const due = getDueCards();
    const dueIds = new Set(due.map(c => getCardId(c)));
    base = base.filter(c => dueIds.has(getCardId(c)));
  } else if (currentMode === 'incorrect') {
    base = base.filter(c => stats[getCardId(c)] === 'incorrect');
  } else if (currentMode === 'unseen') {
    base = base.filter(c => !stats[getCardId(c)]);
  }
  currentDeck = base;
  currentIndex = 0;
  isFlipped = false;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('controls') && (document.getElementById('controls').style.display = '');
  updateCard();
}

function shuffleCards() {
  for (let i = currentDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
  }
  currentIndex = 0;
  isFlipped = false;
  updateCard();
}

function resetStats() {
  if (!confirm('進捗をリセットしてもよいですか？')) return;
  stats = {};
  saveStats();
  updateStatsDisplay();
  rebuildDeck();
}

function updateCard() {
  const wrapper = document.getElementById('cardWrapper');
  const resultBtns = document.getElementById('resultBtns');

  if (currentDeck.length === 0) {
    document.getElementById('cardQuestion').textContent = 'このモードに該当するカードがありません';
    document.getElementById('cardAnswer').innerHTML = '';
    document.getElementById('counter').textContent = '0 / 0';
    resultBtns.style.display = 'none';
    return;
  }

  // Reset flip
  isFlipped = false;
  wrapper.classList.remove('flipped');
  wrapper.style.transform = '';
  resultBtns.style.display = 'none';
  const guide = document.getElementById('swipeGuide');
  if (guide) guide.style.display = 'none';

  const card = currentDeck[currentIndex];
  document.getElementById('cardCategoryFront').textContent = card.category;
  document.getElementById('cardCategoryBack').textContent = card.category;
  const qEl = document.getElementById('cardQuestion');
  const aEl = document.getElementById('cardAnswer');

  qEl.innerHTML = card.q.replace(/\n/g, '<br>');
  aEl.innerHTML = card.a;
  document.getElementById('counter').textContent = `${currentIndex+1} / ${currentDeck.length}`;

  // Update progress
  const seen = currentDeck.filter(c => stats[getCardId(c)]).length;
  const pct = currentDeck.length ? Math.round(seen/currentDeck.length*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${seen} / ${currentDeck.length} 完了`;

  // Re-typeset math with MathJax SVG
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.startup.promise.then(() => {
      MathJax.typesetClear([qEl, aEl]);
      return MathJax.typesetPromise([qEl, aEl]);
    }).then(() => {
      autoResizeCard();
    }).catch(err => console.warn('MathJax error:', err));
  } else {
    autoResizeCard();
  }

  updateStatsDisplay();
}

function flipCard() {
  isFlipped = !isFlipped;
  const wrapper = document.getElementById('cardWrapper');
  wrapper.classList.toggle('flipped', isFlipped);
  const guide = document.getElementById('swipeGuide');
  if (isFlipped) {
    document.getElementById('resultBtns').style.display = 'flex';
    guide.style.display = 'block';
  } else {
    document.getElementById('resultBtns').style.display = 'none';
    guide.style.display = 'none';
  }
}

function markResult(correct) {
  const card = currentDeck[currentIndex];
  const cid = getCardId(card);
  stats[cid] = correct ? 'correct' : 'incorrect';
  updateReview(cid, correct);
  logSession(correct);
  saveStats();
  updateStatsDisplay();
  nextCard();
}

function nextCard() {
  if (currentDeck.length === 0) return;
  if (currentIndex < currentDeck.length - 1) {
    currentIndex++;
    updateCard();
  } else {
    showCompletion();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    updateCard();
  }
}

function showCompletion() {
  const total = currentDeck.length;
  const correct = currentDeck.filter(c => stats[getCardId(c)] === 'correct').length;
  const pct = total ? Math.round(correct/total*100) : 0;
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('resultBtns').style.display = 'none';
}

function restartDeck() {
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  currentIndex = 0;
  isFlipped = false;
  updateCard();
}

function updateStatsDisplay() {
  const relevant = currentDeck;
  const correct = relevant.filter(c => stats[getCardId(c)] === 'correct').length;
  const incorrect = relevant.filter(c => stats[getCardId(c)] === 'incorrect').length;
  const remaining = relevant.filter(c => !stats[getCardId(c)]).length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statIncorrect').textContent = incorrect;
  document.getElementById('statRemaining').textContent = remaining;
}



function updateReviewBadge() {
  const due = getDueCards().length;
  const btn = document.getElementById('modeReview');
  if (btn) btn.textContent = '📅 復習' + (due > 0 ? ' (' + due + ')' : '');
}

// =====================================================
// TOUCH / SWIPE SUPPORT
//   タップ                → カードをめくる
//   答え表示後 左右ドラッグ → カードが指に追従、離すと正解/不正解/戻る
//   問題表示中 左右スワイプ → 次/前のカード
// =====================================================
(function() {
  let startX = 0, startY = 0;
  let isDragging = false;
  let dragEnabled = false;
  let animating = false;
  const DECIDE = 110; // 確定距離(px)

  const wrapper = document.getElementById('cardWrapper');
  const overlay = document.getElementById('swipeOverlay');

  // ドラッグ中: カードをX方向に移動 + 少し傾ける
  function applyDrag(dx) {
    const rotate = dx * 0.04;
    wrapper.style.transition = 'none';
    if (isFlipped) {
      // rotateY(180deg)座標系ではX軸が反転するので符号を逆にする
      wrapper.style.transform = `rotateY(180deg) translateX(${-dx}px) rotate(${rotate}deg)`;
    } else {
      wrapper.style.transform = `translateX(${dx}px) rotate(${rotate}deg)`;
    }
    // オーバーレイ
    const ratio = Math.min(Math.abs(dx) / DECIDE, 1);
    if (dx > 15) {
      overlay.textContent = '✓';
      overlay.style.background = `rgba(74,103,65,${ratio * 0.88})`;
      overlay.style.opacity = ratio;
    } else if (dx < -15) {
      overlay.textContent = '✗';
      overlay.style.background = `rgba(139,58,42,${ratio * 0.88})`;
      overlay.style.opacity = ratio;
    } else {
      overlay.style.opacity = 0;
    }
  }

  // 元の位置に戻る
  function snapBack() {
    wrapper.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    wrapper.style.transform = isFlipped ? 'rotateY(180deg)' : '';
    overlay.style.transition = 'opacity 0.3s';
    overlay.style.opacity = 0;
  }

  // 確定: 指定方向に飛ばす
  function flyOut(direction, onDone) {
    animating = true;
    const rot = direction === 'right' ? 20 : -20;
    // rotateY(180deg)座標系ではX軸が反転するため符号を逆にする
    const tx = isFlipped
      ? (direction === 'right' ? -window.innerWidth : window.innerWidth)
      : (direction === 'right' ?  window.innerWidth : -window.innerWidth);
    const base = isFlipped ? 'rotateY(180deg) ' : '';
    wrapper.style.transition = 'transform 0.32s ease-in, opacity 0.32s ease-in';
    wrapper.style.transform = `${base}translateX(${tx}px) rotate(${rot}deg)`;
    wrapper.style.opacity = '0';
    setTimeout(() => {
      wrapper.style.transition = 'none';
      wrapper.style.transform = '';
      wrapper.style.opacity = '1';
      overlay.style.opacity = 0;
      animating = false;
      onDone();
    }, 340);
  }

  // touchstart
  wrapper.addEventListener('touchstart', e => {
    if (animating) return;
    if (e.target.closest('button')) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = false;
    dragEnabled = isFlipped; // 答え表示後のみドラッグで正解/不正解
  }, { passive: true });

  // touchmove
  wrapper.addEventListener('touchmove', e => {
    if (animating) return;
    const dx = e.touches[0].clientX - startX;
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dy > 70 && !isDragging) return; // 縦スクロール優先
    if (Math.abs(dx) > 8 || isDragging) {
      isDragging = true;
      if (dragEnabled) {
        applyDrag(dx);
      }
    }
  }, { passive: true });

  // touchend
  wrapper.addEventListener('touchend', e => {
    if (animating) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);

    if (!isDragging) {
      // タップ → flipCard は onclick が処理
      return;
    }

    if (dragEnabled) {
      // 答え表示中のドラッグ終了
      if (dx > DECIDE && dy < 90) {
        flyOut('right', () => markResult(true));
      } else if (dx < -DECIDE && dy < 90) {
        flyOut('left', () => markResult(false));
      } else {
        snapBack();
      }
    } else {
      // 問題表示中のスワイプ → 前/次カード
      snapBack();
      if (Math.abs(dx) > 50 && dy < 80) {
        if (dx < 0) nextCard();
        else prevCard();
      }
    }
    isDragging = false;
  }, { passive: true });

  wrapper.addEventListener('touchcancel', () => {
    snapBack();
    isDragging = false;
  }, { passive: true });
})();

let pdfInstance = null;

async function generatePDF() {
  const btn = document.getElementById('pdfBtn');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  // モーダルを先に開いてローディング表示
  document.getElementById('pdfModal').style.display = 'block';
  document.getElementById('pdfLoading').style.display = 'block';
  document.getElementById('pdfContent').innerHTML = `
    <div id="pdfLoading" style="padding:40px;color:#888;text-align:center;">
      <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
      <div>数式をレンダリング中...</div>
    </div>`;

  try {
    // PDFレンダリング用HTMLを構築
    const html = buildPDFHTML();
    const area = document.getElementById('pdfRenderArea');
    area.innerHTML = html;

    // MathJaxでレンダリング
    if (window.MathJax && MathJax.typesetPromise) {
      await MathJax.typesetPromise([area]);
    }

    // 少し待ってからキャプチャ
    await new Promise(r => setTimeout(r, 300));

    // html2canvas でページごとにキャプチャ
    const pages = area.querySelectorAll('.pdf-page');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    pdfInstance = pdf;

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
      });
      if (i > 0) pdf.addPage();
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    }

    // プレビュー表示
    const pdfUrl = pdf.output('bloburl');
    document.getElementById('pdfContent').innerHTML = `
      <iframe src="${pdfUrl}" style="width:100%;height:80vh;border:none;display:block;"></iframe>`;

    area.innerHTML = '';
  } catch(e) {
    document.getElementById('pdfContent').innerHTML =
      `<div style="padding:30px;color:#8b3a2a;">エラー: ${e.message}</div>`;
    console.error(e);
  }

  btn.textContent = '📄 PDF';
  btn.disabled = false;
}

function downloadPDF() {
  if (pdfInstance) {
    pdfInstance.save('actuarial-formula-book.pdf');
  }
}

function closePDFModal() {
  document.getElementById('pdfModal').style.display = 'none';
}

function buildPDFHTML() {
  // カテゴリ順にグループ化
  const catMap = {};
  const catOrder = [];
  cards.forEach((c, i) => {
    if (!catMap[c.category]) { catMap[c.category] = []; catOrder.push(c.category); }
    catMap[c.category].push({ ...c, idx: i });
  });

  const COLORS = {
    deepBlue: '#1e3a5f', gold: '#b8860b', rust: '#8b3a2a',
    lightBlue: '#e8eef5', ink: '#2a1f18', gray: '#888888',
  };

  let globalNum = 1;
  let pages = [];
  let currentPageContent = '';
  let isFirstPage = true;

  // 表紙
  pages.push(`
    <div class="pdf-page" style="width:794px;min-height:1123px;background:#fff;padding:80px 60px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;">
      <div style="font-size:32px;font-weight:700;color:${COLORS.deepBlue};text-align:center;margin-bottom:12px;">アクチュアリー数学</div>
      <div style="font-size:20px;font-weight:700;color:${COLORS.gold};text-align:center;margin-bottom:30px;">公式確認集</div>
      <div style="width:60%;height:2px;background:${COLORS.gold};margin:0 auto 30px;"></div>
      <div style="font-size:13px;color:${COLORS.gray};text-align:center;margin-bottom:16px;">全 ${cards.length} 問 ／ ${catOrder.length} カテゴリ</div>
      <div style="font-size:11px;color:${COLORS.gray};text-align:center;line-height:2;">${catOrder.join(' · ')}</div>
    </div>`);

  // カテゴリ別コンテンツをページに分割
  // 1ページ = A4縦 (794x1123px) padding 40px → 実質 714x1043
  const PAGE_H = 1003; // 余白引いた高さ
  let currentH = 0;
  let pageItems = [];

  function flushPage() {
    if (pageItems.length === 0) return;
    pages.push(`
      <div class="pdf-page" style="width:794px;min-height:1123px;background:#fff;padding:40px 50px;box-sizing:border-box;font-family:'Noto Serif JP',sans-serif;">
        ${pageItems.join('')}
      </div>`);
    pageItems = [];
    currentH = 0;
  }

  catOrder.forEach(cat => {
    // カテゴリヘッダー (約36px)
    const catH = 38;
    if (currentH + catH > PAGE_H) flushPage();
    pageItems.push(`
      <div style="background:${COLORS.deepBlue};color:#fff;padding:8px 16px;border-radius:3px;margin-bottom:8px;font-size:13px;font-weight:700;">
        ${cat}
      </div>`);
    currentH += catH;

    catMap[cat].forEach(c => {
      // 問題行 ≈ 30px、答え行は内容次第（目安50px）
      const estH = 90;
      if (currentH + estH > PAGE_H) flushPage();

      const cleanA = c.a
        .replace(/<span class="param">(.*?)<\/span>/gs, '<span style="font-size:10px;color:#4a6741;background:#eef4ec;padding:1px 6px;border-radius:3px;">$1</span>')
        .replace(/<span[^>]*>/g,'<span>');

      pageItems.push(`
        <div style="margin-bottom:7px;">
          <div style="background:${COLORS.lightBlue};padding:5px 10px;border-radius:2px 2px 0 0;display:flex;align-items:baseline;gap:8px;">
            <span style="font-size:9px;color:${COLORS.gray};flex-shrink:0;">No.${globalNum}</span>
            <span style="font-size:11.5px;font-weight:700;color:${COLORS.ink};">${c.q}</span>
          </div>
          <div style="border-left:3px solid ${COLORS.rust};background:#fff;padding:6px 10px 8px 10px;font-size:10.5px;line-height:1.85;color:${COLORS.deepBlue};">
            ${cleanA}
          </div>
        </div>`);

      currentH += estH;
      globalNum++;
    });

    currentH += 8; // カテゴリ間スペース
  });

  flushPage();
  return pages.join('\n');
}

function showCardList() {
  const modal = document.getElementById('listModal');
  modal.style.display = 'block';

  const sel = document.getElementById('listCatFilter');
  const cats = ['all', ...new Set(cards.map(c => c.category))];
  sel.innerHTML = cats.map(c => `<option value="${c}">${c === 'all' ? 'すべてのカテゴリ' : c}</option>`).join('');
  renderCardList();
}
function closeCardList() {
  document.getElementById('listModal').style.display = 'none';
}
document.getElementById('listModal').addEventListener('click', function(e) {
  if (e.target === this) closeCardList();
});

function renderCardList() {
  const q = (document.getElementById('listSearch').value || '').trim().toLowerCase();
  const catF = document.getElementById('listCatFilter').value;
  const stF  = document.getElementById('listStatusFilter').value;

  let filtered = cards.filter((c, i) => {
    if (catF !== 'all' && c.category !== catF) return false;
    const st = stats[getCardId(c)];
    if (stF === 'correct'   && st !== 'correct')   return false;
    if (stF === 'incorrect' && st !== 'incorrect')  return false;
    if (stF === 'unseen'    && st)                  return false;
    if (q) {
      const text = (c.q + ' ' + c.a + ' ' + c.category).toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('listCount').textContent = `${filtered.length} 件 / 全 ${cards.length} 件`;

  // Group by category
  const groups = {};
  filtered.forEach(c => {
    if (!groups[c.category]) groups[c.category] = [];
    groups[c.category].push(c);
  });

  const statusIcon = (c) => {
    const st = stats[getCardId(c)];
    const r  = reviewData[getCardId(c)];
    const today = new Date().toISOString().slice(0,10);
    const due = r && r.nextReview <= today;
    if (st === 'correct')   return due ? '<span style="color:#b8860b;font-size:0.8rem;">📅</span>' : '<span style="color:#4a6741;font-size:0.85rem;">✓</span>';
    if (st === 'incorrect') return '<span style="color:#8b3a2a;font-size:0.85rem;">✗</span>';
    return '<span style="color:#c0b4a0;font-size:0.75rem;">○</span>';
  };

  const statusBg = (c) => {
    const st = stats[getCardId(c)];
    if (st === 'correct')   return '#f2f7f0';
    if (st === 'incorrect') return '#fdf3f0';
    return '#fafafa';
  };

  let html = '';
  Object.entries(groups).forEach(([cat, items]) => {
    const ok = items.filter(c => stats[getCardId(c)] === 'correct').length;
    html += `
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;
          padding:6px 12px;background:#1e3a5f;color:#f5f0e8;border-radius:3px 3px 0 0;
          font-size:0.78rem;font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;">
          <span>${cat}</span>
          <span style="color:#d4a017;">${ok}/${items.length}</span>
        </div>
        <div style="border:1.5px solid #d4c9b0;border-top:none;border-radius:0 0 3px 3px;overflow:hidden;">
          ${items.map((c, idx) => `
            <div onclick="showDetail(${cards.indexOf(c)})"
              style="display:flex;align-items:center;gap:10px;padding:10px 14px;
              background:${statusBg(c)};border-bottom:1px solid #ede7d9;cursor:pointer;
              transition:background 0.15s;"
              onmouseover="this.style.background='#f0eadf'"
              onmouseout="this.style.background='${statusBg(c)}'">
              <div style="width:22px;text-align:center;flex-shrink:0;">${statusIcon(c)}</div>
              <div style="flex:1;font-size:0.82rem;color:#2a1f18;line-height:1.4;">${c.q.split('\n').join('<br>')}</div>
              <div style="color:#b0a090;font-size:0.85rem;flex-shrink:0;">›</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  if (html === '') html = '<div style="text-align:center;padding:32px;color:#9a8778;">該当するカードがありません</div>';
  document.getElementById('listContent').innerHTML = html;

  // Typeset any inline math in the list
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([document.getElementById('listContent')]).catch(()=>{});
  }
}

function closeDetail() {

}
document.getElementById('detailModal').addEventListener('click', function(e) {

function markFromList(cardIndex, correct) {
  const card = cards[cardIndex];

  updateStatsDisplay();

function showStats() {
  const modal = document.getElementById('statsModal');
  modal.style.display = 'block';
  renderStats();
}
function closeStats() {
  document.getElementById('statsModal').style.display = 'none';
}
// Close on backdrop click
document.getElementById('statsModal').addEventListener('click', function(e) {
  if (e.target === this) closeStats();
});

function renderStats() {
  const total = cards.length;
  const correct = cards.filter(c => stats[getCardId(c)] === 'correct').length;
  const incorrect = cards.filter(c => stats[getCardId(c)] === 'incorrect').length;
  const unseen = total - correct - incorrect;
  const pct = Math.round(correct / total * 100);

  // Due today
  const due = getDueCards().length;

  // Category breakdown
  const cats = [...new Set(cards.map(c => c.category))];
  const catRows = cats.map(cat => {
    const cc = cards.filter(c => c.category === cat);
    const ok = cc.filter(c => stats[getCardId(c)] === 'correct').length;
    const ng = cc.filter(c => stats[getCardId(c)] === 'incorrect').length;
    const p = Math.round(ok / cc.length * 100);
    return { cat, total: cc.length, ok, ng, unseen: cc.length - ok - ng, pct: p };
  });

  // Session history (last 14 days)
  const today = new Date();
  const days = Array.from({length:14}, (_,i) => {
    const d = new Date(today);
    d.setDate(d.getDate() - (13 - i));
    return d.toISOString().slice(0,10);
  });
  const logMap = {};
  sessionLog.forEach(e => logMap[e.date] = e);

  // Streak
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    const e = logMap[days[i]];
    if (e && (e.correct + e.incorrect) > 0) streak++;
    else break;
  }

  const el = document.getElementById('statsContent');
  el.innerHTML = `
    <!-- Overall -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
      ${statBox('総カード数', total, '#1e3a5f')}
      ${statBox('正解済み', correct + ' (' + pct + '%)', '#4a6741')}
      ${statBox('今日の復習', due + '枚', '#b8860b')}
    </div>

    <!-- Progress bar overall -->
    <div style="margin-bottom:24px;">
      <div style="font-size:0.78rem;color:#9a8778;margin-bottom:8px;font-family:JetBrains Mono,monospace;letter-spacing:0.08em;">全体の習熟度</div>
      <div style="height:14px;background:#f0ebe0;border-radius:7px;overflow:hidden;display:flex;">
        <div style="width:${pct}%;background:#4a6741;transition:width 0.6s;"></div>
        <div style="width:${Math.round(incorrect/total*100)}%;background:#8b3a2a;"></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:6px;font-size:0.7rem;color:#9a8778;">
        <span>🟢 正解 ${correct}</span><span>🔴 不正解 ${incorrect}</span><span>⚪ 未学習 ${unseen}</span>
      </div>
    </div>

    <!-- Streak -->
    <div style="margin-bottom:24px;padding:14px 18px;background:#faf7f2;border:1.5px solid #d4c9b0;border-radius:4px;display:flex;align-items:center;gap:16px;">
      <div style="font-size:2rem;">🔥</div>
      <div>
        <div style="font-size:1.4rem;font-weight:700;color:#b8860b;font-family:'Cormorant Garamond',serif;">${streak}日連続</div>
        <div style="font-size:0.72rem;color:#9a8778;">学習ストリーク</div>
      </div>
    </div>

    <!-- 14-day chart -->
    <div style="margin-bottom:24px;">
      <div style="font-size:0.78rem;color:#9a8778;margin-bottom:10px;font-family:JetBrains Mono,monospace;letter-spacing:0.08em;">過去14日の学習</div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:70px;">
        ${days.map(d => {
          const e = logMap[d] || {correct:0,incorrect:0};
          const tot = e.correct + e.incorrect;
          const maxH = 60;
          const h = tot > 0 ? Math.max(4, Math.round(Math.min(tot, 30) / 30 * maxH)) : 3;
          const isToday = d === today.toISOString().slice(0,10);
          const label = d.slice(5); // MM-DD
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
            <div style="width:100%;height:${h}px;background:${tot>0?(isToday?'#b8860b':'#4a6741'):'#e8e0d0'};border-radius:2px 2px 0 0;"></div>
            <div style="font-size:0.5rem;color:${isToday?'#b8860b':'#b0a090'};transform:rotate(-45deg);white-space:nowrap;">${label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Category breakdown -->
    <div>
      <div style="font-size:0.78rem;color:#9a8778;margin-bottom:10px;font-family:JetBrains Mono,monospace;letter-spacing:0.08em;">カテゴリ別習熟度</div>
      ${catRows.map(r => `
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:0.8rem;color:#2a1f18;">${r.cat}</span>
            <span style="font-size:0.72rem;font-family:JetBrains Mono,monospace;color:${r.pct>=80?'#4a6741':r.pct>=50?'#b8860b':'#8b3a2a'};">${r.ok}/${r.total} (${r.pct}%)</span>
          </div>
          <div style="height:8px;background:#f0ebe0;border-radius:4px;overflow:hidden;display:flex;">
            <div style="width:${r.pct}%;background:#4a6741;"></div>
            <div style="width:${Math.round(r.ng/r.total*100)}%;background:#8b3a2a;"></div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- Review schedule -->
    <div style="margin-top:24px;padding:14px 18px;background:#f0f4f8;border:1.5px solid #b8cce0;border-radius:4px;">
      <div style="font-size:0.78rem;color:#1e3a5f;font-weight:600;margin-bottom:8px;">📅 復習スケジュール（今後7日）</div>
      ${reviewSchedule()}
    </div>
  `;
}

function statBox(label, value, color) {
  return `<div style="text-align:center;padding:14px;background:#faf7f2;border:1.5px solid #d4c9b0;border-radius:4px;">
    <div style="font-size:1.5rem;font-weight:700;color:${color};font-family:'Cormorant Garamond',serif;">${value}</div>
    <div style="font-size:0.7rem;color:#9a8778;margin-top:4px;">${label}</div>
  </div>`;
}

function reviewSchedule() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const rows = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const ds = d.toISOString().slice(0,10);
    const count = cards.filter(c => {
      const r = reviewData[getCardId(c)];
      if (!r) return i === 0; // unseen → today
      return r.nextReview === ds;
    }).length;
    const label = i === 0 ? '今日' : i === 1 ? '明日' : `+${i}日`;
    rows.push(`<div style="display:flex;justify-content:space-between;font-size:0.75rem;padding:3px 0;border-bottom:1px solid #d0dce8;">
      <span style="color:#1e3a5f;">${label} (${ds})</span>
      <span style="font-weight:600;color:${count>0?'#b8860b':'#9a8778'};">${count}枚</span>
    </div>`);
  }
  return rows.join('');
}


function autoResizeCard() {
  const wrapper = document.getElementById('cardWrapper');
  const front   = document.getElementById('cardFront');
  const back    = document.getElementById('cardBack');

  // 一時的に両面を visible にして実際の高さを測る
  const prevVis = wrapper.style.visibility;
  wrapper.style.visibility = 'hidden';

  // front の自然な高さ
  front.style.position = 'relative';
  front.style.transform = '';
  const frontH = front.scrollHeight;
  front.style.position = '';
  front.style.transform = '';

  // back の自然な高さ
  back.style.position = 'relative';
  back.style.transform = 'none';
  const backH = back.scrollHeight;
  back.style.position = '';
  back.style.transform = '';

  wrapper.style.visibility = prevVis;

  // 大きい方 + 余白
  const minH = 300;
  const newH = Math.max(minH, frontH, backH) + 8;
  wrapper.style.minHeight = newH + 'px';
}

// Init
buildTabs();
updateCard();
// Show review badge on load
updateReviewBadge();
</script>
</body>
